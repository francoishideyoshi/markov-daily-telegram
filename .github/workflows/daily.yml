name: Markov Daily Signal

on:
  schedule:
    # Runs at 08:00 UTC daily (= 16:00 HKT)
    - cron: "0 8 * * *"
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  markov-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TICKER:      BTC-USD
      YEARS:       "10"
      WINDOW:      "20"
      THRESHOLD:   "0.05"
      MIN_TRAIN:   "252"
      ENABLE_HMM:  "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-markov-${{ hashFiles('scripts/markov_btc.py') }}
          restore-keys: ${{ runner.os }}-pip-markov-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance hmmlearn scipy requests

      - name: Run Markov analysis & send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/markov_btc.py
